services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: fastapi
    networks:
      - tor_net
    expose:
      - 8000

  tor:
    image: osminogin/tor-simple
    container_name: tor
    volumes:
      - ./torrc:/etc/tor/torrc
      - ./hidden_service:/var/lib/tor/hidden_service
    depends_on:
      - api
    networks:
      - tor_net

networks:
  tor_net:

volumes:
  tor_hidden_service: